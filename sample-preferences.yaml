# Sample Herald preferences file
# Copy to ~/.copilot/preferences.yaml and customize for your workflow.
#
# For private/internal preferences, use ~/.copilot/preferences.local.yaml instead.
# Herald loads both files and merges them. Keep secrets and org-specific rules
# in the local file so your public preferences can live in version control.

preferences:
  # Git branch naming - GitHub repos
  - when:
      remote: github.com
    content: |
      Use branch prefixes: `bugfix/`, `feature/`, or `refactor/`.

  # .NET project conventions
  - when:
      fileExists: "**/*.csproj"
    content: |
      This is a .NET project.
      Use `dotnet add package` rather than editing XML directly.
      For XML doc references to language keywords (e.g. null, true, false),
      use `<see langword="null"/>` instead of `<c>null</c>`.

  # Node.js project conventions
  - when:
      fileExists: package.json
    content: |
      When adding dependencies, use `npm install` not manual edits to package.json.

  # Always-on preferences
  - content: |
      When generating PR descriptions or summaries, pipe the output to `clip`
      to put it on the clipboard.
